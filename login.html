<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/login.css" />
  <title>Đăng nhập | Nhà thuốc Long Châu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-login">
<style>
  .bg-login{
    background-image: url('images/backlogin.webp');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
</style>

<div class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">
  <div class="card shadow bg-primary" style="width: 380px;">
    <div class="card-body p-4">

      <div class="text-center mb-3">
        <img src="images/logo.webp" alt="Long Châu" style="height:50px;">
        <h5 class="mt-2 fw-bold">Đăng nhập</h5>
      </div>

      <form>
        <div class="mb-3">
          <label class="form-label">Số điện thoại</label>
          <input type="text" class="form-control" placeholder="Nhập số điện thoại">
        </div>

        <div class="mb-3">
          <label class="form-label">Mật khẩu</label>
          <input type="password" class="form-control" placeholder="Nhập mật khẩu">
        </div>

        <div class="d-flex justify-content-between mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Ghi nhớ</label>
          </div>
          <a href="#" class="text-decoration-none">Quên mật khẩu?</a>
        </div>

       <a href="index.html" class="btn btn-success w-100">Đăng nhập</a>

      </form>

      <hr>

      <div class="text-center">
        <span>Chưa có tài khoản?</span>
        <a href="register.html" class="text-success fw-bold text-decoration-none"> Đăng ký</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
