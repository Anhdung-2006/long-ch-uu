<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký | Nhà thuốc Long Châu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{
      background: url('images/backlogin.webp') center/cover no-repeat;
      min-height: 100vh;
    }
  </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card shadow" style="width:420px;">
  <div class="card-body p-4">

    <div class="text-center mb-3">
      <h5 class="fw-bold text-success">Đăng ký tài khoản</h5>
      <small>Nhà thuốc Long Châu</small>
    </div>

    <form>
      <div class="mb-3">
        <label class="form-label">Họ và tên</label>
        <input type="text" class="form-control" placeholder="Nhập họ tên">
      </div>

      <div class="mb-3">
        <label class="form-label">Số điện thoại</label>
        <input type="text" class="form-control" placeholder="Nhập số điện thoại">
      </div>

      <div class="mb-3">
        <label class="form-label">Mật khẩu</label>
        <input type="password" class="form-control" placeholder="Nhập mật khẩu">
      </div>

      <div class="mb-3">
        <label class="form-label">Nhập lại mật khẩu</label>
        <input type="password" class="form-control" placeholder="Nhập lại mật khẩu">
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="agree">
        <label class="form-check-label" for="agree">
          Tôi đồng ý với điều khoản sử dụng
        </label>
      </div>

      <a href="index.html" class="btn btn-success w-100">Đăng kí</a>

    </form>

    <hr>

    <div class="text-center">
      <span>Đã có tài khoản?</span>
      <a href="login.html" class="text-success fw-bold text-decoration-none"> Đăng nhập</a>
    </div>

  </div>
</div>

</body>
</html>
